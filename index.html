<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediLinks Registration</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        background: linear-gradient(135deg, #1a2980, #26d0ce);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }
      .selection-container {
        text-align: center;
        margin-bottom: 2rem;
      }
      h2,
      h3 {
        color: white;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
      }
      .role-btn {
        padding: 12px 30px;
        margin: 0 10px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
      }
      .role-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      input {
        width: 100%;
        padding: 12px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        margin-top: 5px;
        color: white;
        font-size: 1rem;
        transition: all 0.3s;
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }
      input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
      }
      .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .hidden {
        display: none;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      form {
        animation: fadeIn 0.5s ease-out;
      }
      /* Responsive Design */
      @media (max-width: 600px) {
        .role-btn {
          width: 100%;
          margin: 10px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="selection-container">
        <h2>Select Your Role</h2>
        <button class="role-btn doctor-btn" onclick="showForm('doctor')">
          Doctor
        </button>
        <button class="role-btn user-btn" onclick="showForm('user')">
          User
        </button>
      </div>
      <form id="registration-form" class="hidden">
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit" class="submit-btn">Register</button>
      </form>
    </div>
    <script>
      function showForm(role) {
        const form = document.getElementById("registration-form");
        if (role === "doctor") {
          // Customize form for doctors if needed
          form.classList.remove("hidden");
        } else if (role === "user") {
          // Customize form for users if needed
          form.classList.remove("hidden");
        }
      }

      // Form submission handler
      document
        .getElementById("registration-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          // Handle form submission logic here
          alert("Registration submitted!");
          // Reset form
          this.reset();
          this.classList.add("hidden");
        });
    </script>
  </body>
</html>
